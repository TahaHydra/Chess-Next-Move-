</nav>
<div class="hidden md:flex items-center">
<div class="w-8 h-8 rounded-full bg-surface-variant flex items-center justify-center cursor-pointer hover:bg-surface-container-high transition-colors border border-outline-variant">
<span class="material-symbols-outlined text-on-surface text-sm" data-icon="person">person</span>
</div>
</div>
</header>

<main class="flex-1 overflow-hidden flex flex-col md:flex-row w-full max-w-[1600px] mx-auto p-container-margin gap-gutter relative">

<!-- Left Pane: Eval Bar -->
<aside class="w-12 shrink-0 hidden md:flex flex-col relative rounded-lg overflow-hidden border border-surface-gray bg-surface-container-low shadow-sm">

<div class="w-full bg-[#E2E8F0] flex-1 flex flex-col justify-end relative transition-all duration-500 ease-out" style="height: 65%;">
<!-- Center line indicator -->
<div class="absolute left-0 right-0 top-1/2 h-[1px] bg-primary z-10 shadow-[0_0_4px_rgba(212,175,55,0.8)]"></div>
<div class="p-1 text-center font-label-mono text-label-mono text-surface-dim font-bold z-10">+1.24</div>
</div>
<!-- Disadvantage area -->
<div class="w-full bg-[#1A202C] flex-1" style="height: 35%;"></div>
</aside>
<!-- Center Pane: Chess Board -->

<div class="w-full max-w-[800px] aspect-square relative shadow-lg ring-1 ring-surface-gray rounded-sm overflow-hidden bg-surface-container-low p-2">

</div>

<span class="text-on-surface group-hover:text-primary transition-colors">g3</span> d5 2. Bg2 c6 3. Nf3 Nf6

</button>

<button class="w-full text-left bg-surface-container hover:bg-surface-variant transition-colors p-2 rounded flex items-center gap-3 group border border-transparent hover:border-loss-red border-l-2 border-l-loss-red cursor-pointer">
<div class="w-12 text-center font-label-mono text-label-mono text-loss-red bg-[#3A1C1C] py-1 rounded">

<div class="flex-1 font-label-mono text-label-mono text-on-surface truncate overflow-hidden opacity-80 group-hover:opacity-100">

<span class="text-loss-red group-hover:underline">f3?</span> e5 2. g4?? Qh4#

<button class="flex-1 bg-surface-container-high hover:bg-surface-variant text-on-surface font-body-sm font-semibold py-3 px-4 rounded border border-surface-gray transition-colors flex items-center justify-center gap-2">
